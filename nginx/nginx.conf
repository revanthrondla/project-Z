# ─────────────────────────────────────────────────────────────────────────────
# HireIQ — Nginx reverse proxy config
# Used only for self-hosted deployments (not Railway/Render — those handle SSL)
#
# Prerequisites:
#   1. Replace YOUR_DOMAIN with your actual domain name throughout this file
#   2. Obtain SSL cert: docker compose run --rm certbot certonly \
#        --webroot -w /var/www/certbot -d YOUR_DOMAIN
#   3. Uncomment the HTTPS server block and restart nginx
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ── HTTP — redirect to HTTPS (or serve directly if no SSL yet) ───────────────
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

